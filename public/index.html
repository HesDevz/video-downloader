<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>视频下载</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --text: #17181c;
      --muted: #667085;
      --line: #d8dde7;
      --accent: #0f766e;
      --accent-dark: #0b5f59;
      --danger: #b42318;
      --ok: #067647;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: grid;
      place-items: center;
      padding: 28px;
    }
    main {
      width: min(760px, 100%);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 28px;
      box-shadow: 0 18px 45px rgba(17, 24, 39, 0.08);
    }
    h1 {
      font-size: 24px;
      margin: 0 0 8px;
      letter-spacing: 0;
    }
    .path {
      color: var(--muted);
      margin: 0 0 22px;
      font-size: 14px;
      word-break: break-all;
    }
    label {
      display: block;
      font-weight: 650;
      margin-bottom: 8px;
    }
    textarea {
      width: 100%;
      min-height: 100px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      font: inherit;
      line-height: 1.45;
      outline: none;
    }
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.14);
    }
    .actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      flex-wrap: wrap;
    }
    button {
      appearance: none;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      min-height: 44px;
      padding: 0 16px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
    }
    button:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    button:disabled {
      cursor: wait;
      opacity: .6;
    }
    button.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    button.primary:hover { background: var(--accent-dark); }
    #status {
      margin-top: 10px;
      min-height: 20px;
      font-size: 14px;
      color: var(--muted);
    }
    .result {
      margin-top: 18px;
      padding: 14px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fafafa;
      display: none;
      word-break: break-all;
      line-height: 1.55;
      white-space: pre-wrap;
      max-height: 500px;
      overflow-y: auto;
    }
    .result.ok {
      display: block;
      border-color: #abefc6;
      color: var(--ok);
      background: #f6fef9;
    }
    .result.err {
      display: block;
      border-color: #fecdca;
      color: var(--danger);
      background: #fffbfa;
    }
    .result.transcript {
      display: block;
      border-color: var(--line);
      color: var(--text);
      background: #fafafa;
    }
    .hint {
      margin-top: 14px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main>
    <h1>视频下载</h1>
    <p class="path">支持：抖音 · 小红书 · B站 · YouTube · 快手 &nbsp;|&nbsp; 保存到：~/Desktop/下载</p>

    <label for="url">粘贴视频链接或整段分享口令</label>
    <textarea id="url" placeholder="支持抖音、小红书、B站、YouTube、快手的链接&#10;例如：https://v.douyin.com/xxxx/ 或 https://www.bilibili.com/video/BVxxxx"></textarea>

    <div class="actions">
      <button class="primary" id="btn-download">下载视频</button>
      <button id="btn-audio">提取音频</button>
      <button id="btn-subtitle">提取字幕</button>
      <button id="btn-transcript">提取文案</button>
    </div>
    <div id="status"></div>
    <div id="result" class="result"></div>

    <div class="hint">
      提取字幕：仅支持 YouTube、B站（平台自动生成字幕）<br>
      提取文案：YouTube/B站 优先用字幕，其他平台用 MiMo 语音识别
    </div>
  </main>

  <script>
    const input = document.getElementById('url');
    const status = document.getElementById('status');
    const result = document.getElementById('result');
    const apiBase = location.protocol === 'file:' ? 'http://127.0.0.1:8787' : '';

    if (location.protocol === 'file:') {
      show('err', '请用 http://localhost:8787 打开这个工具。直接打开 HTML 文件无法连接下载服务。');
    }

    function show(kind, text) {
      result.className = `result ${kind}`;
      result.textContent = text;
    }

    async function callApi(endpoint, loadingText) {
      const url = input.value.trim();
      if (!url) {
        show('err', '先粘贴一个视频链接。');
        return;
      }

      const buttons = document.querySelectorAll('button');
      buttons.forEach(b => b.disabled = true);
      status.textContent = loadingText;
      result.className = 'result';
      result.textContent = '';

      try {
        const response = await fetch(`${apiBase}${endpoint}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        });
        const data = await response.json();
        if (!response.ok || !data.ok) {
          throw new Error(data.error || '操作失败');
        }

        if (data.text) {
          // Subtitle or transcript result
          const method = data.method || '字幕';
          show('transcript', `【${method}】${data.platform || ''} ${data.title || ''}\n${'─'.repeat(40)}\n\n${data.text}`);
        } else {
          // File download result
          show('ok', `完成：${data.filename}\n平台：${data.platform}\n大小：${(data.bytes / 1024 / 1024).toFixed(1)} MB\n保存到：${data.path}`);
        }
      } catch (error) {
        show('err', error.message);
      } finally {
        buttons.forEach(b => b.disabled = false);
        status.textContent = '';
      }
    }

    document.getElementById('btn-download').addEventListener('click', () => {
      callApi('/api/download', '正在下载视频...');
    });
    document.getElementById('btn-audio').addEventListener('click', () => {
      callApi('/api/audio', '正在提取音频...');
    });
    document.getElementById('btn-subtitle').addEventListener('click', () => {
      callApi('/api/subtitles', '正在提取字幕...');
    });
    document.getElementById('btn-transcript').addEventListener('click', () => {
      callApi('/api/transcript', '正在提取文案...');
    });

    // Enter key triggers download
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        callApi('/api/download', '正在下载视频...');
      }
    });
  </script>
</body>
</html>
