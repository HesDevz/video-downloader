<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>视频下载</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #faf8f5;
      --card: #fffefb;
      --text: #2c2c2c;
      --muted: #8a8680;
      --line: #e8e4de;
      --accent: #d4a574;
      --accent-dark: #c49464;
      --accent-hover: #e8c4a0;
      --danger: #c0392b;
      --ok: #27ae60;
      --radius: 16px;
      --radius-sm: 10px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      display: grid; place-items: center;
      padding: 24px;
    }
    main {
      width: min(680px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 32px;
      box-shadow: 0 4px 24px rgba(0,0,0,.04);
    }
    h1 {
      font-size: 22px; margin: 0 0 6px;
      font-weight: 700; color: var(--text);
    }
    .subtitle {
      color: var(--muted); font-size: 13px;
      margin: 0 0 24px; line-height: 1.5;
    }

    /* ── Path row ── */
    .path-row {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 20px; font-size: 13px;
    }
    .path-label { color: var(--muted); white-space: nowrap; }
    .path-input {
      flex: 1; min-width: 160px;
      border: 1px solid var(--line); border-radius: var(--radius-sm);
      padding: 6px 12px; font: inherit; font-size: 13px;
      color: var(--text); background: var(--bg); outline: none;
      transition: border-color .2s;
    }
    .path-input:focus { border-color: var(--accent); }

    /* ── Input area ── */
    .input-group {
      display: flex; gap: 10px; margin-bottom: 16px;
    }
    textarea {
      flex: 1; min-height: 56px; max-height: 120px; resize: vertical;
      border: 1px solid var(--line); border-radius: var(--radius-sm);
      padding: 12px 14px; font: inherit; font-size: 14px;
      line-height: 1.5; outline: none; background: var(--bg);
      transition: border-color .2s;
    }
    textarea:focus { border-color: var(--accent); }
    .btn-parse {
      min-width: 72px;
      background: var(--accent); color: #fff; border: none;
      border-radius: var(--radius-sm); font-weight: 600;
      font-size: 14px; cursor: pointer; transition: background .2s;
    }
    .btn-parse:hover { background: var(--accent-dark); }
    .btn-parse:disabled { opacity: .5; cursor: wait; }

    /* ── Video preview ── */
    .preview {
      display: none; margin-bottom: 20px;
      border-radius: var(--radius-sm); overflow: hidden;
      border: 1px solid var(--line); background: #000;
    }
    .preview.show { display: block; }
    .preview video {
      width: 100%; max-height: 360px; display: block;
      border-radius: var(--radius-sm);
    }
    .preview-info {
      padding: 10px 14px; background: var(--bg);
      font-size: 13px; color: var(--muted);
      display: flex; justify-content: space-between; align-items: center;
    }
    .preview-title {
      font-weight: 600; color: var(--text);
      font-size: 14px; margin-bottom: 4px;
    }

    /* ── Actions ── */
    .actions {
      display: flex; gap: 10px; flex-wrap: wrap;
    }

    /* ── Button group ── */
    .dropdown { position: relative; display: inline-flex; }
    .btn-group {
      display: inline-flex; border-radius: var(--radius-sm);
      overflow: hidden;
    }
    .btn-group button { border-radius: 0; border-right: none; }
    .btn-group button:first-child { border-radius: var(--radius-sm) 0 0 var(--radius-sm); }
    .btn-group button:last-child {
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      border-left: 1px solid rgba(255,255,255,.2);
      padding: 0 10px; min-width: 34px;
    }
    .dropdown-menu {
      display: none; position: absolute; top: calc(100% + 6px); left: 0;
      min-width: 180px; background: var(--card); border: 1px solid var(--line);
      border-radius: var(--radius-sm); box-shadow: 0 8px 32px rgba(0,0,0,.1);
      z-index: 100; overflow: hidden;
    }
    .dropdown-menu.open { display: block; }
    .dropdown-menu button {
      display: block; width: 100%; border: none; border-radius: 0;
      text-align: left; padding: 10px 14px; min-height: auto;
      background: transparent; font-size: 13px; font-weight: 500;
    }
    .dropdown-menu button:hover { background: var(--bg); color: var(--accent-dark); }

    button {
      appearance: none; border: 1px solid var(--line); border-radius: var(--radius-sm);
      background: var(--card); color: var(--text); min-height: 42px; padding: 0 16px;
      font: inherit; font-weight: 600; font-size: 13px;
      cursor: pointer; transition: all .2s; white-space: nowrap;
    }
    button:hover { border-color: var(--accent); color: var(--accent-dark); }
    button:disabled { cursor: wait; opacity: .5; }
    button.primary {
      background: var(--accent); color: #fff; border-color: var(--accent);
    }
    button.primary:hover { background: var(--accent-dark); }
    .arrow { font-size: 10px; margin-left: 2px; opacity: .7; }

    /* ── Status & Result ── */
    #status {
      margin-top: 12px; min-height: 18px;
      font-size: 13px; color: var(--muted);
    }
    .result {
      margin-top: 16px; padding: 16px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--line); background: var(--bg);
      display: none; word-break: break-all; line-height: 1.7;
      white-space: pre-wrap; max-height: 400px; overflow-y: auto;
      font-size: 13px;
    }
    .result.ok {
      display: block; border-color: #b8e6c8;
      color: var(--ok); background: #f0faf4;
    }
    .result.err {
      display: block; border-color: #f5c6c6;
      color: var(--danger); background: #fdf2f2;
    }
    .result.transcript {
      display: block; border-color: var(--accent-hover);
      color: var(--text); background: #fdf8f3;
    }

    .hint {
      margin-top: 16px; font-size: 12px; color: var(--muted);
      line-height: 1.6; padding-top: 12px; border-top: 1px solid var(--line);
    }
  </style>
</head>
<body>
  <main>
    <h1>视频下载</h1>
    <p class="subtitle">支持：抖音 · 小红书 · B站 · YouTube · 快手</p>

    <div class="path-row">
      <span class="path-label">保存到</span>
      <input class="path-input" id="save-dir" value="~/Desktop/下载" placeholder="保存路径">
    </div>

    <div class="input-group">
      <textarea id="url" placeholder="粘贴视频链接或分享口令" rows="2"></textarea>
      <button class="btn-parse" id="btn-parse">解析</button>
    </div>

    <div class="preview" id="preview">
      <video id="video-player" controls preload="metadata"></video>
      <div class="preview-info">
        <div>
          <div class="preview-title" id="preview-title"></div>
          <div id="preview-meta"></div>
        </div>
      </div>
    </div>

    <div class="actions">
      <div class="dropdown">
        <div class="btn-group primary">
          <button id="btn-download" onclick="doAction('download')">下载视频</button>
          <button onclick="toggleMenu('download-menu')"><span class="arrow">▼</span></button>
        </div>
        <div class="dropdown-menu" id="download-menu">
          <button data-action="download" data-label="下载视频">下载视频</button>
          <button data-action="audio" data-label="下载音频">下载音频 (mp3)</button>
          <button data-action="subtitle" data-label="下载字幕">下载字幕 (纯文本)</button>
          <button data-action="srt" data-label="下载SRT">下载 SRT 字幕 (带时间线)</button>
          <button data-action="transcript" data-label="下载文案">下载文案</button>
        </div>
      </div>

      <div class="dropdown">
        <div class="btn-group">
          <button id="btn-extract" onclick="doAction('extract')">提取字幕</button>
          <button onclick="toggleMenu('extract-menu')"><span class="arrow">▼</span></button>
        </div>
        <div class="dropdown-menu" id="extract-menu">
          <button data-action="extract" data-label="提取字幕">提取字幕 (纯文本)</button>
          <button data-action="extract-srt" data-label="提取SRT">提取 SRT 字幕 (带时间线)</button>
          <button data-action="extract-transcript" data-label="提取文案">提取文案</button>
        </div>
      </div>
    </div>

    <div id="status"></div>
    <div id="result" class="result"></div>

    <div class="hint">
      字幕 / SRT：仅 YouTube、B站 支持（平台自动生成字幕）<br>
      文案：YouTube/B站 优先用字幕，其他平台用 MiMo 语音识别
    </div>
  </main>

  <script>
    const input = document.getElementById('url');
    const saveDirInput = document.getElementById('save-dir');
    const statusEl = document.getElementById('status');
    const result = document.getElementById('result');
    const preview = document.getElementById('preview');
    const videoPlayer = document.getElementById('video-player');
    const previewTitle = document.getElementById('preview-title');
    const previewMeta = document.getElementById('preview-meta');
    const apiBase = location.protocol === 'file:' ? 'http://127.0.0.1:8787' : '';

    if (location.protocol === 'file:') {
      show('err', '请用 http://localhost:8787 打开这个工具。');
    }

    const savedDir = localStorage.getItem('save-dir');
    if (savedDir) saveDirInput.value = savedDir;

    /* ── Dropdown ── */
    function toggleMenu(id) {
      const menu = document.getElementById(id);
      const wasOpen = menu.classList.contains('open');
      closeAllMenus();
      if (!wasOpen) menu.classList.add('open');
    }
    function closeAllMenus() {
      document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('open'));
    }
    document.addEventListener('click', e => {
      if (!e.target.closest('.dropdown')) closeAllMenus();
    });

    document.querySelectorAll('.dropdown-menu button[data-action]').forEach(btn => {
      btn.addEventListener('click', () => {
        const group = btn.closest('.dropdown');
        const mainBtn = group.querySelector('.btn-group button:first-child');
        if (mainBtn) mainBtn.textContent = btn.dataset.label;
        closeAllMenus();
        doAction(btn.dataset.action);
      });
    });

    function show(kind, text) {
      result.className = `result ${kind}`;
      result.textContent = text;
    }

    /* ── 解析按钮 ── */
    document.getElementById('btn-parse').addEventListener('click', async () => {
      const url = input.value.trim();
      if (!url) { show('err', '先粘贴一个视频链接。'); return; }

      const btn = document.getElementById('btn-parse');
      btn.disabled = true;
      btn.textContent = '解析中…';
      preview.classList.remove('show');

      try {
        // 用 download API 获取视频信息（不实际下载大文件）
        // 先尝试获取字幕/文案来验证链接有效
        const resp = await fetch(`${apiBase}/api/transcript`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url, save_dir: saveDirInput.value.trim() }),
        });
        const data = await resp.json();
        if (!resp.ok || !data.ok) throw new Error(data.error || '解析失败');

        // 显示解析结果
        const method = data.method || '字幕';
        const title = data.title || '未知标题';
        const platform = data.platform || '';
        previewTitle.textContent = title;
        previewMeta.textContent = `${platform} · ${method} · ${data.text?.length || 0} 字`;
        preview.classList.add('show');

        // 隐藏视频播放器（因为 transcript API 不返回视频URL）
        videoPlayer.style.display = 'none';

        show('transcript', `${method} · ${platform}\n${'─'.repeat(40)}\n\n${data.text}`);
      } catch (error) {
        show('err', error.message);
        preview.classList.remove('show');
      } finally {
        btn.disabled = false;
        btn.textContent = '解析';
      }
    });

    /* ── Action map ── */
    const ACTIONS = {
      'download':            { endpoint: '/api/download',    loading: '正在下载视频…',       type: 'file' },
      'audio':               { endpoint: '/api/audio',       loading: '正在提取音频…',       type: 'file' },
      'subtitle':            { endpoint: '/api/subtitles',   loading: '正在下载字幕…',       type: 'download-text', ext: '.txt' },
      'srt':                 { endpoint: '/api/srt',         loading: '正在下载 SRT 字幕…',  type: 'download-text', ext: '.srt' },
      'transcript':          { endpoint: '/api/transcript',  loading: '正在提取文案…',       type: 'download-text', ext: '.txt' },
      'extract':             { endpoint: '/api/subtitles',   loading: '正在提取字幕…',       type: 'show' },
      'extract-srt':         { endpoint: '/api/srt',         loading: '正在提取 SRT 字幕…',  type: 'show' },
      'extract-transcript':  { endpoint: '/api/transcript',  loading: '正在提取文案…',       type: 'show' },
    };

    async function doAction(action) {
      closeAllMenus();
      const cfg = ACTIONS[action];
      if (!cfg) return;

      const url = input.value.trim();
      if (!url) { show('err', '先粘贴一个视频链接。'); return; }

      localStorage.setItem('save-dir', saveDirInput.value.trim());

      const buttons = document.querySelectorAll('button');
      buttons.forEach(b => b.disabled = true);
      statusEl.textContent = cfg.loading;
      result.className = 'result';
      result.textContent = '';

      try {
        const resp = await fetch(`${apiBase}${cfg.endpoint}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url, save_dir: saveDirInput.value.trim() }),
        });
        const data = await resp.json();
        if (!resp.ok || !data.ok) throw new Error(data.error || '操作失败');

        if (cfg.type === 'file') {
          show('ok', `完成：${data.filename}\n平台：${data.platform}\n大小：${(data.bytes / 1024 / 1024).toFixed(1)} MB\n保存到：${data.path}`);
        } else if (cfg.type === 'download-text') {
          const text = data.text || '';
          const fname = (data.title || 'subtitle') + cfg.ext;
          downloadTextFile(fname, text);
          show('ok', `已下载：${fname}\n平台：${data.platform || ''}\n字符数：${text.length}`);
        } else {
          const text = data.text || '(空)';
          const method = data.method ? `【${data.method}】` : '';
          const title = data.title ? ` ${data.title}` : '';
          const plat = data.platform ? ` ${data.platform}` : '';
          show('transcript', `${method}${plat}${title}\n${'─'.repeat(40)}\n\n${text}`);
        }
      } catch (error) {
        show('err', error.message);
      } finally {
        buttons.forEach(b => b.disabled = false);
        statusEl.textContent = '';
      }
    }

    function downloadTextFile(filename, text) {
      const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        document.getElementById('btn-parse').click();
      }
    });
  </script>
</body>
</html>
