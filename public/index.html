<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>抖音视频下载</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --text: #17181c;
      --muted: #667085;
      --line: #d8dde7;
      --accent: #0f766e;
      --accent-dark: #0b5f59;
      --danger: #b42318;
      --ok: #067647;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: grid;
      place-items: center;
      padding: 28px;
    }
    main {
      width: min(760px, 100%);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 28px;
      box-shadow: 0 18px 45px rgba(17, 24, 39, 0.08);
    }
    h1 {
      font-size: 24px;
      margin: 0 0 8px;
      letter-spacing: 0;
    }
    .path {
      color: var(--muted);
      margin: 0 0 22px;
      font-size: 14px;
      word-break: break-all;
    }
    label {
      display: block;
      font-weight: 650;
      margin-bottom: 8px;
    }
    textarea {
      width: 100%;
      min-height: 150px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      font: inherit;
      line-height: 1.45;
      outline: none;
    }
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.14);
    }
    .row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 14px;
      flex-wrap: wrap;
    }
    button {
      appearance: none;
      border: 0;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      min-height: 44px;
      padding: 0 18px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: var(--accent-dark); }
    button:disabled {
      cursor: wait;
      opacity: .72;
    }
    #status {
      min-height: 24px;
      font-size: 14px;
      color: var(--muted);
    }
    .result {
      margin-top: 18px;
      padding: 14px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fafafa;
      display: none;
      word-break: break-all;
      line-height: 1.55;
    }
    .result.ok {
      display: block;
      border-color: #abefc6;
      color: var(--ok);
      background: #f6fef9;
    }
    .result.err {
      display: block;
      border-color: #fecdca;
      color: var(--danger);
      background: #fffbfa;
    }
  </style>
</head>
<body>
  <main>
    <h1>抖音视频下载</h1>
    <p class="path">保存到：~/Desktop/下载</p>

    <label for="url">粘贴抖音分享链接或整段口令</label>
    <textarea id="url" placeholder="例如：https://v.douyin.com/xxxx/ 或整段复制口令"></textarea>

    <div class="row">
      <button id="download">下载</button>
      <span id="status"></span>
    </div>

    <div id="result" class="result"></div>
  </main>

  <script>
    const input = document.getElementById('url');
    const button = document.getElementById('download');
    const status = document.getElementById('status');
    const result = document.getElementById('result');
    const apiBase = location.protocol === 'file:' ? 'http://127.0.0.1:8787' : '';

    if (location.protocol === 'file:') {
      show('err', '请用 http://localhost:8787 打开这个工具。直接打开 HTML 文件无法连接下载服务。');
    }

    function show(kind, text) {
      result.className = `result ${kind}`;
      result.textContent = text;
    }

    button.addEventListener('click', async () => {
      const url = input.value.trim();
      if (!url) {
        show('err', '先粘贴一个抖音链接。');
        return;
      }

      button.disabled = true;
      status.textContent = '正在解析并下载...';
      result.className = 'result';
      result.textContent = '';

      try {
        const response = await fetch(`${apiBase}/api/download`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        });
        const data = await response.json();
        if (!response.ok || !data.ok) {
          throw new Error(data.error || '下载失败');
        }
        show('ok', `下载完成：${data.path}`);
        input.value = '';
      } catch (error) {
        show('err', error.message);
      } finally {
        button.disabled = false;
        status.textContent = '';
      }
    });
  </script>
</body>
</html>
